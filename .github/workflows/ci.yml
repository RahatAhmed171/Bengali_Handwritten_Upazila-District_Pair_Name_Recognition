name: Bengali Handwritten Subdistrict-District Name Recognition API CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify application imports
        run: |
          python -c "from api import app; print('Backend API imported successfully')"
      

      - name: Verify Frontend UI imports
        run: |
          python -c "import streamlit; print('Streamlit framework loaded successfully')"

      - name: Build Docker image
        run: |
          docker build -t bangla_handwritten_subdistrict_district_classifier .